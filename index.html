<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOO 戰術監控儀表板</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background-color: #0f172a; /* slate-900 */
            color: #f8fafc; /* slate-50 */
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7); /* slate-800 with opacity */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .pulse-dot { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .is-loading svg { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="flex flex-col md:flex-row justify-between items-center pb-4 border-b border-slate-700">
            <div>
                <h1 class="text-3xl font-bold text-white flex items-center gap-3">
                    <i data-lucide="line-chart" class="text-blue-500 w-8 h-8"></i>
                    VOO 戰術監控儀表板
                </h1>
                <p class="text-slate-400 text-sm mt-1">依據 20 日高點動態計算回撤與建倉支撐位</p>
            </div>
            <div class="mt-4 md:mt-0 flex items-center gap-4">
                <div class="flex items-center gap-2 px-4 py-2 bg-slate-800 rounded-full border border-slate-600">
                    <div id="statusDot" class="w-3 h-3 rounded-full bg-yellow-500"></div>
                    <span id="updateTime" class="text-sm text-slate-300 transition-all">準備連線...</span>
                </div>
                <button id="refreshBtn" onclick="fetchAllData(true)" class="p-2 bg-blue-600 hover:bg-blue-500 rounded-lg transition-all flex items-center justify-center" title="強制更新">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="glass-card p-5 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="zap" class="w-16 h-16"></i></div>
                <h3 class="text-slate-400 text-sm font-medium">VOO 即時價格 (30秒更新)</h3>
                <div class="mt-2 flex items-baseline gap-2">
                    <span id="realtimePrice" class="text-4xl font-bold text-white">0.00</span>
                    <span class="text-lg text-slate-400">USD</span>
                </div>
                <div class="mt-2 text-sm flex items-center gap-1" id="priceChangeContainer">
                    <span id="priceChangeIconWrapper"><i data-lucide="trending-up" class="w-4 h-4"></i></span>
                    <span id="priceChange">0.00%</span>
                </div>
            </div>
            
            <div class="glass-card p-5 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="sheet" class="w-16 h-16"></i></div>
                <h3 class="text-slate-400 text-sm font-medium">VOO 基準價格 (Google Sheet)</h3>
                <div class="mt-2 flex items-baseline gap-2">
                    <span id="sheetPrice" class="text-4xl font-bold text-white">0.00</span>
                     <span class="text-lg text-slate-400">USD</span>
                </div>
                 <div class="mt-2 text-sm text-slate-400">所有計算以此為準</div>
            </div>

            <div class="glass-card p-5 relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10"><i data-lucide="activity" class="w-16 h-16"></i></div>
                <h3 class="text-slate-400 text-sm font-medium">動態回撤 (Drawdown)</h3>
                <div class="mt-2 flex items-baseline gap-2">
                    <span id="drawdown" class="text-4xl font-bold text-rose-500">0.00%</span>
                </div>
                <div class="mt-2 text-sm text-slate-400">距 20 日高點回測幅度</div>
            </div>

            <div class="glass-card p-5 relative overflow-hidden">
                <h3 class="text-slate-400 text-sm font-medium">市場恐慌指標 (VIX)</h3>
                <div class="mt-2 flex items-baseline gap-2">
                    <span id="vixValue" class="text-3xl font-bold">0.00</span>
                </div>
                <div id="vixStatus" class="mt-2 text-sm font-medium">等待資料...</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="space-y-6">
                <div class="glass-card p-6">
                    <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                        <i data-lucide="settings" class="w-5 h-5 text-slate-400"></i>
                        計算基準 (Google Sheet)
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">近 20 日高點 (用來算跌幾%)</label>
                            <div class="relative"><span class="absolute left-3 top-2.5 text-slate-500">$</span><input type="number" id="high20" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-8 pr-4" readonly></div>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">VOO 月線 (MA20) - 短線成本</label>
                            <div class="relative"><span class="absolute left-3 top-2.5 text-slate-500">$</span><input type="number" id="ma20" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-8 pr-4" readonly></div>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">VOO 季線 (MA50) - 中線支撐</label>
                            <div class="relative"><span class="absolute left-3 top-2.5 text-slate-500">$</span><input type="number" id="ma50" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-8 pr-4" readonly></div>
                        </div>
                        <div>
                            <label class="block text-sm text-slate-400 mb-1">USD/TWD 匯率</label>
                            <div class="relative"><span class="absolute left-3 top-2.5 text-slate-500">$</span><input type="number" id="twdRate" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-8 pr-4" readonly></div>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6">
                    <h2 class="text-lg font-bold mb-4">趨勢狀態</h2>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center p-3 rounded-lg bg-slate-900/50 border border-slate-700" id="ma20StatusBox">
                            <span class="text-slate-300">對比月線 (MA20)</span>
                            <span id="ma20Status" class="font-bold">-</span>
                        </div>
                        <div class="flex justify-between items-center p-3 rounded-lg bg-slate-900/50 border border-slate-700" id="ma50StatusBox">
                            <span class="text-slate-300">對比季線 (MA50)</span>
                            <span id="ma50Status" class="font-bold">-</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card p-6 h-full">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2 text-white">
                        <i data-lucide="target" class="w-6 h-6 text-emerald-500"></i>
                        進場策略：支撐買點追蹤
                    </h2>
                    <div class="space-y-8">
                        <!-- Levels will be injected here -->
                    </div>
                    <div id="actionAlert" class="mt-8 p-4 rounded-lg bg-slate-800 border border-slate-700 flex items-start gap-3 hidden">
                        <i data-lucide="bell-ring" class="w-6 h-6 text-amber-500 flex-shrink-0 mt-0.5"></i>
                        <div>
                            <h4 class="font-bold text-white" id="alertTitle">建議行動</h4>
                            <p class="text-slate-300 text-sm mt-1" id="alertText">目前尚無觸發任何買點。</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const config = {
            finnhubToken: 'd6p2ch1r01qk3chil2l0d6p2ch1r01qk3chil2lg',
            googleSheetUrl: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQsKINCRk0uXPgo0P6Zmof1ib2HBdep_130-kXV4Qxuo83HpDbWgbtytDKg90P0vngP8kn-Skg-xgzx/pub?gid=1414034082&single=true&output=csv',
            cacheDuration: 20 * 60 * 1000, // 20 minutes
            supportLevels: [
                { name: '初階買點 (支撐一)', drop: 0.04, description: '適合「首批試單」的價位', color: 'emerald', id: 's1' },
                { name: '強烈買點 (支撐二)', drop: 0.05, description: '適合「重兵加碼」放大資金', color: 'amber', id: 's2' },
                { name: '極限特價 (支撐三)', drop: 0.07, description: '極端行情才會出現的「絕地大特價」', color: 'rose', id: 's3' }
            ]
        };

        let state = {
            realtimePrice: 0,
            previousClose: 0,
            sheetData: {}
        };

        function renderSupportLevels() {
            const container = document.querySelector('.lg\\:col-span-2 .space-y-8');
            let html = '';
            config.supportLevels.forEach(level => {
                html += `
                    <div class="relative">
                        <div class="flex justify-between items-end mb-2">
                            <div>
                                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                                    ${level.name}
                                    <span class="text-xs bg-slate-700 px-2 py-1 rounded text-slate-300">高點回檔 ${level.drop * 100}%</span>
                                </h3>
                                <p class="text-sm text-slate-400 mt-1">${level.description}</p>
                            </div>
                            <div class="text-right">
                                <div class="text-2xl font-bold text-white" id="${level.id}Price">$0.00</div>
                                <div class="text-sm" id="${level.id}Dist">距離: 0.00%</div>
                            </div>
                        </div>
                        <div class="h-3 w-full bg-slate-800 rounded-full overflow-hidden">
                            <div id="${level.id}Bar" class="h-full bg-${level.color}-500 transition-all duration-500 w-0"></div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        function updateUI() {
            const { realtimePrice, previousClose, sheetData } = state;
            const {
                'VOO 目前價格': sheetPrice = 0,
                '近 20 日高點': high20 = 0,
                'VOO 月線 (MA20)': ma20 = 0,
                'VOO 季線 (MA50)': ma50 = 0,
                '市場恐慌指標 (VIX)': vix = 0,
                'USD/TWD 匯率': twdRate = 0
            } = sheetData;
            
            // Realtime price display
            document.getElementById('realtimePrice').innerText = realtimePrice.toFixed(2);
            const changePct = previousClose > 0 ? ((realtimePrice - previousClose) / previousClose) * 100 : 0;
            const changeEl = document.getElementById('priceChange');
            const changeContainer = document.getElementById('priceChangeContainer');
            const iconWrapper = document.getElementById('priceChangeIconWrapper');
            if(changePct >= 0) {
                changeEl.innerText = `+${changePct.toFixed(2)}%`;
                changeContainer.className = "mt-2 text-sm flex items-center gap-1 text-emerald-500 font-bold";
                iconWrapper.innerHTML = '<i data-lucide="trending-up" class="w-4 h-4"></i>';
            } else {
                changeEl.innerText = `${changePct.toFixed(2)}%`;
                changeContainer.className = "mt-2 text-sm flex items-center gap-1 text-rose-500 font-bold";
                iconWrapper.innerHTML = '<i data-lucide="trending-down" class="w-4 h-4"></i>';
            }

            // Sheet data display
            document.getElementById('sheetPrice').innerText = parseFloat(sheetPrice).toFixed(2);
            document.getElementById('high20').value = parseFloat(high20).toFixed(2);
            document.getElementById('ma20').value = parseFloat(ma20).toFixed(2);
            document.getElementById('ma50').value = parseFloat(ma50).toFixed(2);
            document.getElementById('twdRate').value = parseFloat(twdRate).toFixed(2);
            document.getElementById('vixValue').innerText = parseFloat(vix).toFixed(2);
            
            const drawdown = high20 > 0 ? ((sheetPrice - high20) / high20) * 100 : 0;
            document.getElementById('drawdown').innerText = `${drawdown.toFixed(2)}%`;

            const vixStatus = document.getElementById('vixStatus');
            if (vix > 0) {
                if (vix >= 30) {
                    vixStatus.innerText = "🚨 市場極度恐慌！";
                    vixStatus.className = "mt-2 text-sm font-bold text-rose-500";
                } else if (vix <= 20) {
                    vixStatus.innerText = "✅ 市場情緒穩定";
                    vixStatus.className = "mt-2 text-sm font-medium text-emerald-500";
                } else {
                    vixStatus.innerText = "⚠️ 市場略為謹慎";
                    vixStatus.className = "mt-2 text-sm font-medium text-amber-500";
                }
            }
            
            function updateMAStatus(idPrefix, price, maPrice, name) {
                const statusEl = document.getElementById(`${idPrefix}Status`);
                const boxEl = document.getElementById(`${idPrefix}StatusBox`);
                if (price > maPrice) {
                    statusEl.innerText = `站上${name}`;
                    statusEl.className = "font-bold text-emerald-500";
                } else {
                    statusEl.innerText = `跌破${name}`;
                    statusEl.className = "font-bold text-rose-500";
                }
            }
            if (ma20 > 0) updateMAStatus('ma20', sheetPrice, ma20, '月線');
            if (ma50 > 0) updateMAStatus('ma50', sheetPrice, ma50, '季線');
            
            config.supportLevels.forEach(level => {
                const targetPrice = high20 * (1 - level.drop);
                document.getElementById(`${level.id}Price`).innerText = `$${targetPrice.toFixed(2)}`;
                const distEl = document.getElementById(`${level.id}Dist`);
                const barEl = document.getElementById(`${level.id}Bar`);
                const diff = sheetPrice - targetPrice;
                
                if (diff <= 0) {
                    distEl.innerText = "✅ 已到達買點！";
                    distEl.className = "text-sm font-bold text-emerald-400";
                    barEl.style.width = "100%";
                } else {
                    const diffPct = sheetPrice > 0 ? (diff / sheetPrice) * 100 : 0;
                    distEl.innerText = `距離: ${diffPct.toFixed(2)}%`;
                    distEl.className = "text-sm text-slate-400";
                    const totalDropRange = high20 - targetPrice;
                    const currentDrop = high20 - sheetPrice;
                    let fillPct = (totalDropRange > 0) ? (currentDrop / totalDropRange) * 100 : 0;
                    fillPct = Math.max(0, Math.min(100, fillPct));
                    barEl.style.width = `${fillPct}%`;
                }
            });

            const alertBox = document.getElementById('actionAlert');
            const title = document.getElementById('alertTitle');
            const text = document.getElementById('alertText');
            alertBox.classList.remove('hidden');

            const s3Price = high20 * (1 - config.supportLevels[2].drop);
            const s2Price = high20 * (1 - config.supportLevels[1].drop);
            const s1Price = high20 * (1 - config.supportLevels[0].drop);

            if (sheetPrice <= s3Price && s3Price > 0) {
                 title.innerText = "🚨 絕地大特價觸發！";
                 text.innerText = `已觸發 ${config.supportLevels[2].drop*100}% 回檔，可考慮執行最終批次買進。`;
            } else if (sheetPrice <= s2Price && s2Price > 0) {
                 title.innerText = "⚠️ 強烈買點觸發！";
                 text.innerText = `已觸發 ${config.supportLevels[1].drop*100}% 回檔，可考慮放大資金規模。`;
            } else if (sheetPrice <= s1Price && s1Price > 0) {
                title.innerText = "✅ 初階買點觸發！";
                text.innerText = `已觸發 ${config.supportLevels[0].drop*100}% 回檔，適合進行首批試單建倉。`;
            } else {
                title.innerText = "👀 觀察等待中";
                text.innerText = s1Price > 0 ? `距離最近買點還有 ${(sheetPrice - s1Price).toFixed(2)} 美元。` : '等待市場數據載入...';
            }
            
            lucide.createIcons();
        }

        async function fetchVooQuote() {
            try {
                const url = `https://finnhub.io/api/v1/quote?symbol=VOO&token=${config.finnhubToken}&_t=${Date.now()}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`Finnhub API Error: ${res.statusText}`);
                const data = await res.json();
                if (data.c != null && data.pc != null) {
                    state.realtimePrice = data.c;
                    state.previousClose = data.pc;
                }
            } catch (e) {
                console.error("Fetch VOO Quote Error:", e);
                return false;
            }
            return true;
        }

        async function fetchGoogleSheetData(force = false) {
            const cacheKey = 'googleSheetData';
            const cached = localStorage.getItem(cacheKey);
            if (cached && !force) {
                const { timestamp, data } = JSON.parse(cached);
                if (Date.now() - timestamp < config.cacheDuration) {
                    state.sheetData = data;
                    return true;
                }
            }

            try {
                const url = `${config.googleSheetUrl}&_t=${Date.now()}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`Google Sheet fetch error: ${res.statusText}`);
                
                const csvText = await res.text();
                const rows = csvText.trim().split('\n').map(row => row.split(','));
                const data = {};
                rows.forEach(row => {
                  if (row.length >= 2) {
                    const key = row[0].trim();
                    const value = parseFloat(row[1]);
                    if (key && !isNaN(value)) {
                      data[key] = value;
                    }
                  }
                });
                state.sheetData = data;
                localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data }));
            } catch(e) {
                console.error("Fetch Google Sheet Data Error:", e);
                return false;
            }
            return true;
        }
        
        async function fetchAllData(isManual = false) {
             const refreshBtn = document.getElementById('refreshBtn');
             const dot = document.getElementById('statusDot');
             const updateTimeEl = document.getElementById('updateTime');

             if(isManual) {
                refreshBtn.classList.add('is-loading');
                refreshBtn.disabled = true;
                updateTimeEl.innerText = '更新中...';
             }
            
            const results = await Promise.all([
                fetchVooQuote(),
                fetchGoogleSheetData(isManual)
            ]);

            const [isVooSuccess, isSheetSuccess] = results;

            if (isVooSuccess && isSheetSuccess) {
                dot.className = 'w-3 h-3 rounded-full bg-green-500';
            } else {
                dot.className = 'w-3 h-3 rounded-full bg-red-500';
            }

            updateUI();
            updateTimeEl.innerText = `最後更新: ${new Date().toLocaleTimeString()}`;

            if(isManual) {
                refreshBtn.classList.remove('is-loading');
                refreshBtn.disabled = false;
            }
        }
        
        window.addEventListener('load', () => {
            renderSupportLevels();
            fetchAllData(true);
            
            setInterval(async () => {
                await fetchVooQuote();
                updateUI();
            }, 30 * 1000); 
            
            setInterval(() => fetchAllData(false), 5 * 60 * 1000); // Check for fresh sheet data every 5 mins
        });
    </script>
</body>
</html>
